name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync locked dependencies
        run: uv sync --locked --python "${{ matrix.python-version }}"
      - name: Run unit tests
        run: uv run --locked --python "${{ matrix.python-version }}" python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: uv run --locked --python "${{ matrix.python-version }}" python -m compileall -q src tests
      - name: Build package artifacts
        if: matrix.python-version == '3.12'
        run: uv build
