name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Sync locked dependencies
        run: uv sync --locked --python "${{ matrix.python-version }}"
      - name: Run unit tests
        run: uv run --locked --python "${{ matrix.python-version }}" python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: uv run --locked --python "${{ matrix.python-version }}" python -m compileall -q src tests
      - name: Build package artifacts
        if: matrix.python-version == '3.12'
        run: uv build
