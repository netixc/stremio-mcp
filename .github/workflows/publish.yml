name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Verify tag commit belongs to main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Verify tag and release notes
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from datetime import date
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          assert tag == f"v{version}", f"tag {tag!r} does not match version {version!r}"

          changelog = Path("CHANGELOG.md").read_text()
          match = re.search(rf"^## \[{re.escape(version)}\] - (.+)$", changelog, re.MULTILINE)
          assert match, f"CHANGELOG.md has no section for {version}"
          release_date = match.group(1)
          assert re.fullmatch(r"\d{4}-\d{2}-\d{2}", release_date), (
              f"release date must use YYYY-MM-DD, got {release_date!r}"
          )
          date.fromisoformat(release_date)
          PY
      - name: Sync locked dependencies
        run: uv sync --locked --python 3.12
      - name: Run tests
        run: uv run --locked --python 3.12 python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: uv run --locked --python 3.12 python -m compileall -q src tests
      - name: Build package artifacts
        run: uv build
      - name: Verify artifact inventory and wheel startup
        run: |
          wheel="dist/stremio_mcp_server-${GITHUB_REF_NAME#v}-py3-none-any.whl"
          test -f "$wheel"
          test -f "dist/stremio_mcp_server-${GITHUB_REF_NAME#v}.tar.gz"
          ANDROID_TV_HOST= TMDB_API_KEY= STREMIO_AUTH_KEY= \
            uvx --no-env-file --from "$wheel" stremio-mcp-server </dev/null
      - name: Validate MCP Registry metadata
        run: |
          uv run --locked --python 3.12 python - <<'PY'
          import json
          from pathlib import Path

          import httpx

          server = json.loads(Path("server.json").read_text())
          response = httpx.post(
              "https://registry.modelcontextprotocol.io/v0/validate",
              json=server,
              timeout=30,
          )
          response.raise_for_status()
          result = response.json()
          assert result.get("valid") is True, result
          PY
      - name: Store immutable release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/stremio-mcp-server/
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist/
      - name: Publish package with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          print-hash: true
